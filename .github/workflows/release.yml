name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Build and verify packages
        run: |
          make package
          test "v$(./build/cmny --version | cut -d' ' -f2)" = "$GITHUB_REF_NAME"
          make verify-packages
      - name: Attest package provenance
        uses: actions/attest@v4
        with:
          subject-path: "dist/cmny-${{ github.ref_name }}-*"
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/cmny-${{ github.ref_name }}-*.tar.gz
            dist/cmny-${{ github.ref_name }}-*.zip
            dist/SHA256SUMS
